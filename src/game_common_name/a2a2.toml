name = "猎鹿博弈"

desc = """
「Stag Hunt」— 序数偏好 R > T > P > S
两个纯策略 NE：(C,C) 和 (D,D)。
双方合作猎鹿可得最优收益（R），但若一方背叛去猎兔（D），背叛者得 T 而合作者得最差的 S。
命名由来：出自卢梭《论人类不平等的起源》中的寓言——两个猎人可以选择合作猎鹿（大收益，需配合）或独自猎兔（小收益，有保障）。恐惧驱动的社会困境：缺乏对对方合作的信心会导致帕累托次优的 (D,D)。
现实案例：创业合伙人——两人一起做大项目（猎鹿）能赚大钱，但担心对方中途退出去做自己稳妥的小项目（猎兔），结果各自做小项目（D,D 均衡），陷入次优但安全的结果。
Robinson-Goforth 拓扑周期表 Layer 2。
"""
