desc = """
「Battle of the Sexes」
两个 NE：(C,C) 和 (D,D)。双方都宁愿在一起但内容意见不合——协调问题中的利益冲突。
先动优势（First-mover advantage）显著：先承诺的一方可以迫使对方就范。
命名由来：经典故事来自 1950 年代博弈论文献——丈夫想看拳击（boxing），妻子想看芭蕾（ballet）。虽然双方都更愿意一起做某事而非分开，但对具体内容有分歧。博弈的名称就来源于这个经典故事。
现实案例：一对情侣周末约会——男生想看科幻片，女生想看爱情片。各自分开看（D,D）不如一起看同一部电影（C,C 或 D,D 是两个 NE），但选哪部片有利益冲突。
"""
