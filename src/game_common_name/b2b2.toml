name = "英雄博弈"

desc = """
「Hero」（Rapoport 原型）— 序数偏好 S > T > R > P
两个 NE：(C,D) 和 (D,C)。
从 (C,C) 单方偏离时双方都获益，但偏离者获益更少——对方才是更大赢家（S > T > R）。
命名由来：Rapoport 称其为 Hero（英雄），因为这类博弈中牺牲自己、成就他人者（即单方合作、被对方背叛的 S 收益者）反而是最大赢家——类似于英雄舍己为人的精神。
现实案例：团队中的默默奉献者——你加班完成了同事的部分工作，同事坐享其成，最终形成一个人付出一个人受益的（C,D）或（D,C）均衡，长期来看谁付出谁受益取决于角色分配。
Rapoport 1967 四原型之一（Hero），不在 RG 12 基博弈中。
"""
