name = "撒玛利亚人困境"
rowPlayerName = "被援助者（A6）"
colPlayerName = "援助者（C1）"
desc = """
「Samaritan's Dilemma / Harmony x Chicken」— Bruns (2015) 二名法
一方为 C1（和谐博弈，R>S>T>P，总是愿意帮助），另一方为 A6（铲雪博弈，T>R>S>P，有搭便车动机）。
模型化援助者与被援助者之间的激励冲突：援助者希望帮助但知道援助会鼓励依赖，被援助者知道会获得援助所以缺乏自助动力。
命名由来：源自《圣经·好撒马利亚人》的比喻——被强盗打伤的人躺在路边，祭司和利未人路过都没有帮助他，最后一位撒马利亚人（被犹太人视为外邦人）停下来救助了他。Buchanan (1975) 用此典故命名这类博弈：援助者面临帮了会助长依赖、不帮又于心不忍的两难。
现实案例：社会福利制度——政府知道发放失业救济金会降低求职意愿，但不发放则无法保障基本生活。受助者预期到救济金的存在而减少求职努力。最终政府持续发放、受助者持续依赖，形成援助依赖。
另一案例：子女与父母——子女有动机啃老（不工作），父母总是愿意提供支持，最终形成父母供养、子女啃老的均衡。
"""
