name = "死锁博弈"

desc = """
「Deadlock」— 序数偏好 T > P > R > S
背叛行严格占优，(D,D) 是唯一纳什均衡。
与囚徒困境的关键区别：(D,D) 优于 (C,C)，因此双方都满意于背叛，不存在困境。
命名由来：「Deadlock（死锁）」指双方都偏好背叛、合作完全不可能的结构性僵局。这个命名抓住了博弈的本质——没有任何出路。
现实案例：贸易保护主义——两个国家都对对方商品加征关税（背叛）比双边自由贸易（合作）更有利。即使知道自由贸易对双方整体更好，单方开放会让对方占便宜，最终双方都加关税（D,D 均衡），形成死锁。
Robinson-Goforth 拓扑周期表 Layer 4。
"""
