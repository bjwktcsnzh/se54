name = "反向保证博弈"

desc = """
序数偏好 P > S > R > T

两个纯策略 NE：(C,C) 和 (D,D)，且 (D,D) 帕累托占优 (C,C)。

**命名由来：** 「反向保证」对应标准保证博弈（Assurance / Stag Hunt, R > T > P > S）的结构镜像。标准保证博弈中双方需要保证相互合作才能达到最优均衡；而在本型中，双方需要保证对方也会背叛，否则单方背叛会被利用（T 是最差）。P > S 意味着背叛的稳定回报优于"单方合作"中对方背叛的收益。Robinson-Goforth (2005) 归类为 Assurance 家族的变体，位于猎鹿博弈的拓扑近邻区域。区别在于本型的焦点均衡是 (D,D) 而非 (C,C)——协调的方向反了。

**现实案例：** 两位学生合写论文。C = 认真写、出全力，D = 划水、少出力。如果双方都划水（D,D → P）：论文勉强及格，谁也没多费力气——最佳。如果一方认真写一方划水（C,D → S）：认真的人独自扛下了工作——多少有点亏但至少论文写完了（良好）。如果双方都认真写（C,C → R）：论文优秀但花费了双倍劳动——尚可。如果一方划水一方认真（D,C → T）：划水的人白嫖了对方的劳动——最差（可能被发现或良心不安）。如果双方都能确保对方也会划水（需要保证），则能稳定到 (D,D) 均衡。

参考文献：Robinson & Goforth (2005); Bruns (2015).
"""
