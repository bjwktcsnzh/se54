name = "反转斗鸡博弈"

desc = """
序数偏好 S > P > T > R

无严格优势策略。两个纯策略 NE：(C,D) 和 (D,C)。R（双方合作）为最差收益。

**命名由来：** 「反转斗鸡」因为本型在交换 C↔D 标签后即转化为标准斗鸡博弈（Chicken / Snowdrift, T > R > S > P）。S > P > T > R 在 Rappoport & Guyer (1966) 分类中属于第 12 号严格对称序数博弈，在 Robinson-Goforth (2005) 拓扑中位于 Chicken 近邻区域。本型与标准斗鸡的核心区别：在标准斗鸡中，（C,C）的 R 收益中等偏上——双方怯懦（均让步）的结果尚可接受；而在本型中 R 是最差收益——双方合作竟然比单方被利用还要糟糕。这意味着玩家宁愿选择"单方面吃亏"也不要"双方都退让"。

**现实案例：** 两位学者争夺一个教职。C = 积极竞争（展示成果、申请），D = 被动等待（不主动展示）。S（我积极、对方被动）：我是唯一展示实力的人，评审关注到我——最佳。P（双方都被动）：都没主动推进——至少谁也没抢风头（次佳）。T（我被動、对方积极）：我显得不感兴趣，对方抢占先机——第三。R（双方都积极）：恶性竞争，评审疲于比较——最差（两败俱伤）。最终一人积极一人被动，形成不对称均衡。

参考文献：Rapoport & Guyer (1966); Robinson & Goforth (2005); Bruns (2015).
"""
