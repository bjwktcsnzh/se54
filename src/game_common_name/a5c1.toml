name = "和谐-争夺博弈"
rowPlayerName = "和谐型玩家（C1）"
colPlayerName = "争夺型玩家（A5）"
desc = """
「Harmony x Battle」— Bruns (2015) 二名法
一方为 C1（和谐博弈，R>S>T>P，偏好合作），另一方为 A5（争夺博弈，T>S>R>P，偏好先发制人）。
两个非对称 NE：(C,D) 和 (D,C)——和谐型总是想合作，争夺型总是想先发制人，和谐型被动、争夺型主动。
命名由来：Bruns (2015) 二名法——Harmony 类型的玩家总是合作，Battle 类型的玩家通过先发制人获益。
现实案例：传统企业（C1，偏好稳定合作）面对颠覆型创业公司（A5，偏好主动进攻）——创业公司先推出颠覆性产品（背叛），传统企业被迫应对（也只能背叛），进入新的竞争格局。
另一案例：激进投资者（A5）收购保守公司股份——投资者逼公司改革（背叛），保守管理层（C1）想维持现状但被迫跟进。
Bruns (2015) 二名法体系中 Harmony-Battle 组合。
"""
