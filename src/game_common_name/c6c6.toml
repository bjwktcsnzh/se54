name = "殉道博弈"

desc = """
序数偏好 S > P > R > T

合作（C）为严格占优策略，唯一纯策略 NE 为 (C,C)，但 P > R。

**命名由来：** 「殉道」（Martyr）取自 Rapoport (1967) 对 2×2 对称博弈四大原型的命名——Exploiter（囚徒困境）、Leader（斗鸡）、Hero（猎鹿）、Martyr。殉道博弈是囚徒困境的"逆博弈"：交换 C 和 D 的标签后，本型正好转化为标准的囚徒困境（T > R > P > S）。标志性特征是 P > R——双方背叛（P）的收益优于双方合作（R）。这意味着玩家对"一起背叛"的偏好超过"一起合作"——一种深层的猜忌心态：与其一起诚实不如一起欺骗。Robinson-Goforth (2005) 的拓扑周期表中与囚徒困境互为对偶。

**现实案例：** 两位前商业合伙人竞争同一客户。C = 公平竞争、共享信息，D = 互相拆台。S（我公平、对方拆台）：我是受害者，业界的同情和道德优势——最佳收益。P（双方互相拆台）：两败俱伤，但至少谁也没占便宜——仍优于 R（次佳）。R（双方公平竞争）：可能让客户坐收渔利，谁也没得到好处——第三。T（我拆台、对方公平）：赢了客户但输了口碑——最差。由于 S 和 P 排名高于 R 和 T，玩家发现即使合作是策略均衡（严格占优），内心却更倾向于背叛——一种"嘴上说合作，内心想背叛"的矛盾。

参考文献：Rapoport (1967), "Exploiter, Leader, Hero, and Martyr: The Four Archetypes of the 2×2 Game"; Robinson & Goforth (2005); Bruns (2015).
"""
