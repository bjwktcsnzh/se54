name = "保证博弈"

desc = """
「Assurance」— 序数偏好 R > P > T > S
两个纯策略 NE：(C,C) 和 (D,D)。(C,C) 帕累托占优 (D,D)。
双方都偏好合作，但需要对方的保证——若担心对方背叛，退守 (D,D) 是安全的。
命名由来：「Assurance（保证）」来源于 Sen (1967) 的命名——每个玩家都需要对方保证会合作才敢合作。核心问题是信任而非诱惑。
现实案例：两国裁军谈判——双方都希望同时裁军（C,C 均衡），但如果一方怀疑对方会偷偷保留武器，不如都保留武器（D,D 均衡）来得安全。最终结果取决于双方对彼此信任的程度。
Robinson-Goforth 拓扑周期表 Layer 2。
"""
