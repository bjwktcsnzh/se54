name = "被动撒玛利亚人困境"
rowPlayerName = "投资者（A5）"
colPlayerName = "创业者（A6）"
desc = """
「Passive Samaritan's Dilemma / Battle x Chicken」— Bruns (2015)
一方为 A5（争夺博弈，T>S>R>P，有先发制人动机），另一方为 A6（铲雪博弈，T>R>S>P，希望对方合作自己背叛）。
命名由来：与主动型撒玛利亚人困境相对。Buchanan (1980) 提出的变体——被动型中援助者的 S（被利用）是第三差而非次差，意味着被利用的后果比主动型更严重。因此援助者更加谨慎、被动，不会主动出手相助。
现实案例：风险投资——投资者想投资但怕被创业者坑；创业者希望投资者出钱而自己全力运营（背叛占优）。投资者一旦被坑损失很大，所以观望不前，结果双方都不投入（D,D 均衡），好项目也拿不到钱。
与主动型的区别在于一方偏好中 S 与 P 的排序互换：被动型中被利用的后果更严重。
"""
