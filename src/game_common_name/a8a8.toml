name = "缺失博弈"

desc = """
序数偏好 P > R > S > T

两个纯策略 NE：(C,C) 和 (D,D)，双方都偏好 (D,D) 但 (C,C) 也是可接受均衡。

**命名由来：** 「缺失」的概念来自 Robinson-Goforth (2005) 中对 A8 的讨论——在 12 基博弈的拓扑结构中，A8 恰好对应标准性别战（Battle of the Sexes）中列玩家的偏好序（标准化为 T > P > R > S 的行玩家 vs P > R > S > T 的列玩家），但作为对称博弈出现时，双方都偏好"各做各的事"（D,D）而不是"一起行动"（C,C）。命名"缺失"有两层含义：一是从博弈的结构看，（C,C）中的 R 收益虽然次于 P，但至少比被利用（S）和利用他人（T）都好——这种"尚可接受但不理想"的状态暗示了某种共同偏好的缺失；二是 A8 本身在文献中常被描述为一种"缺失"更清晰协调焦点的博弈——它介于保证博弈和协调博弈之间。

**现实案例：** 两位艺术家决定是否合作办展。C = 合作，D = 单独办。P（双方单独办）：各自完全掌控自己的作品——最佳。R（双方合作办展）：合集可能更有趣但仍需要妥协——良好（次佳）。S（我合作而对方不合作）：我已经联系了场地对方却退出——尴尬（第三）。T（我不合作而对方合作）：对方办展我没参与——错过机会且面子上不好看（最差）。存在两个均衡但谁也不敢轻易承诺合作。

参考文献：Robinson & Goforth (2005); Bruns (2015).
"""
