colPlayerName = "防御方（D4）"
desc = """
「Protector / Compromise x Hero」— Bruns (2015)
一方为 D4（妥协博弈，T>P>S>R，有强烈单方背叛动机），另一方为 B3（英雄博弈，T>S>P>R，主动挑战者）。
双方都有强烈的单方背叛动机。唯一 NE：(D,D)。
命名由来：Bruns 称其为 Protector（保护者），因为在这个博弈中，双方都采取攻击性策略（D,D），但各自都在保护自己的利益不受对方侵害。每方背叛不是因为贪婪，而是因为不背叛就会被对方严重利用。
现实案例：冷战时期的军备竞赛——两个超级大国都不断增加军费（背叛），不是因为想打仗，而是怕对方超过自己。双方陷入了保护自己的军备竞赛陷阱。
另一案例：安全软件公司与黑客的博弈——安全公司不断加固系统（背叛/主动防御），黑客不断寻找新漏洞（背叛/攻击），双方都在保护或捍卫自己的立场。
Bruns 二名法体系中 Compromise-Hero 组合，亦称 Protector。
"""
