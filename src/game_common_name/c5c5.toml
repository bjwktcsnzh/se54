name = "本分博弈"

desc = """
序数偏好 S > R > P > T

合作（C）为严格占优策略，唯一纯策略 NE 为 (C,C)。

**命名由来：** 「本分」意为安守本分、不图非分之利。本型的特征不同于 C4（S > R > T > P）的关键在于 P > T——双方背叛（P）的收益优于单方背叛的诱惑（T）。这意味着背叛行为被双重抑制：不仅合作占优，而且即使判断失误导致双方背叛，其结果（P）也好过利用对方（T）。Robinson-Goforth (2005) 中归入 Harmony 大类的亚型。区别于 C4 和 C6：本型的 R（双方合作）排名第二，P 排名第三，T 排名最末。

**现实案例：** 两位邻居商量共同维护公共花园。C = 参与维护，D = 不参与。S（维护而对方不维护）：我是唯一维护的人，邻居们称赞我——得到社区尊重（最佳）。R（双方都维护）：花园管理有序——双方受益（次佳）。P（都不维护）：花园荒废——至少谁也没占谁便宜（第三）。T（不维护而对方维护）：我白嫖了对方的劳动——良知不安、怕被议论（最差）。理性选择是双方都参与（C,C 均衡）。

参考文献：Robinson & Goforth (2005), "The Topology of the 2×2 Games"; Bruns (2015), "Names for Games".
"""
