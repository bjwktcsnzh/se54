colPlayerName = "霸凌者（D5）"
desc = """
「Bully / Deadlock x Battle」— Bruns (2015)
一方为 D5（死锁博弈，T>P>R>S，有背叛严格占优策略），另一方为 A5（争夺博弈，T>S>R>P，有争夺动机）。
双方都有背叛倾向，但一方有争夺动机。唯一 NE：(D,D)。
命名由来：「Bully（霸凌）」取自校园霸凌场景——霸凌者（有严格的背叛占优策略）总是采取攻击姿态，被霸凌者虽然想争夺但无法扭转被背叛的格局。结果霸凌者总是得逞（D,D），被霸凌者只能忍受。
现实案例：大公司（D5）和小公司（A5）在市场份额上的博弈——大公司凭借规模优势总是降价打压（背叛占优），小公司虽然想竞争（争夺）但最终只能接受被挤压的市场份额（D,D）。
另一案例：激进挑战者（A5）挑战行业垄断者（D5）——挑战者发起价格战（争夺），但垄断者凭借资源总是应战（背叛占优），最终挑战者损失更大。
Bruns 二名法体系中 Deadlock-Battle 组合。
"""
