name = "反向协调博弈"

desc = """
序数偏好 P > R > T > S

两个纯策略 NE：(C,C) 和 (D,D)，双方一致偏好 (D,D)。

**命名由来：** 「反向协调」对应纯协调博弈（Pure Coordination）的结构反转。标准纯协调博弈（B1/B2/B3 类别）中双方偏好 (C,C) 均衡；而在本型中双方一致偏好 (D,D) 均衡。协调博弈的本质是双方利益完全一致、只需要选择同一个均衡——本型的"反向"在于双方相信的焦点是背叛而非合作。Robinson & Goforth (2005) 将 B 类定义为"一致博弈"（Consensus），其核心特征是两个均衡无冲突，玩家对偏好的排序完全一致。B4 的特殊性在于 P > R 使得双方都更偏好背叛方向的均衡。

**现实案例：** 两个农户共享灌溉渠。C = 按规定时间取水（合作），D = 随时随意取水（背叛）。P（双方随时取水）：各自灵活安排灌溉——最佳。R（双方按规定取水）：有序但缺乏灵活性——良好。T（我随意、对方守规）：我得了方便——尚可。S（我守规、对方随意）：我的地被耽误了——最差。双方都认同灵活安排（D,D 均衡）优于死板规定（C,C 均衡），因此一致选择"背叛"方向的协调。

参考文献：Robinson & Goforth (2005); Bruns (2015).
"""
