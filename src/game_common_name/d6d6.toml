name = "囚徒困境"

desc = """
「Prisoner's Dilemma」（Rapoport 称 Martyr/殉道者）
序数偏好 T > R > P > S
背叛行严格占优，(D,D) 是唯一纳什均衡，但此结果帕累托劣于 (C,C)。
个人理性与集体理性剧烈冲突——每个理性个体都选择背叛，结果全体受损。
命名由来：源自 Melvin Dresher & Merrill Flood 1950 年在兰德公司设计的经典实验故事——两个囚犯被分别审讯，每人可以选择坦白（背叛）或沉默（合作）。如果都沉默，各判 1 年；都坦白，各判 3 年；一人坦白一人沉默，坦白者释放、沉默者判 5 年。理性人都会选择坦白，最终两人都判 3 年，比都沉默的 1 年更糟——这就是困境（Dilemma）。Rapoport 称其为 Martyr（殉道者），因为合作者在这个博弈中是被牺牲的一方。
现实案例：价格战——两家公司竞相降价（背叛）争夺市场，结果利润都被压薄；军备竞赛——两国都增加军费（背叛）导致资源浪费；公地悲剧——牧民都增加放牧（背叛）导致草场退化。
Robinson-Goforth 拓扑周期表 Layer 4。Rapoport 四原型之一（Martyr）。
"""
