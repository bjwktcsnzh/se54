colPlayerName = "赖账客户（D6）"
desc = """
「Alibi / Assurance x Prisoner's Dilemma」— Bruns (2015)
一方为 A1（保证博弈，R>P>T>S，偏好合作但需要对方保证），另一方为 D6（囚徒困境，T>R>P>S，有背叛严格占优策略）。
唯一 NE：(D,D)——合作方倾向于合作，但面对必然背叛的对手只能退守。
命名由来：「Alibi（不在场证明）」指的是面对囚徒困境类型的对手时，保证博弈的玩家最终选择背叛，但可以辩解说别无选择——对方有严格占优的背叛策略，不背叛只会更惨。这个借口就是 Alibi。
现实案例：诚信供应商（A1）和习惯赖账的客户（D6）——供应商想诚信合作但知道客户一定会赖账，于是也只能要求预付款（背叛），然后说不是我不想赊账，是你逼的。
Bruns 二名法：Assurance-PD 组合。
"""
