name = "纯协调博弈"

desc = """
「Pure Coordination」— 序数偏好 R > P > S > T
两个 NE：(C,C) 和 (D,D)，且双方无偏好冲突——都偏好 (C,C) 但 (D,D) 也是均衡。
命名由来：「Pure Coordination（纯协调）」指玩家之间完全没有利益冲突，唯一的挑战是如何协调到同一个均衡点上。这是最纯粹的协调问题：只需达成共识，无需担心背叛。
现实案例：靠左行驶还是靠右行驶——只要大家都一致就行（C,C 或 D,D 均衡），具体靠哪边不重要。另一个例子：约定视频会议用的软件平台。
Robinson-Goforth 拓扑周期表 Layer 2。
"""
