name = "铲雪博弈"

desc = """
「Chicken / Snowdrift / Hawk-Dove」（Rapoport 称 Exploiter）
序数偏好 T > R > S > P
两个非对称 NE：(C,D) 和 (D,C)。
双方最希望对方合作自己背叛，但若都背叛则得最差结果（P）。
命名由来：有三个常见的名字来源——(1)「Chicken（斗鸡）」来自经典场景：两人驾车相向而行，先转向的人被嘲笑为鸡；(2)「Snowdrift（铲雪）」来自另一场景：大雪封路，两人都希望对方去铲雪，自己坐享其成；(3)「Hawk-Dove（鹰鸽）」来自动物行为学中鹰派与鸽派策略的演化模型。Rapoport 称 Exploiter（剥削者），因为最佳策略是让对方合作而自己剥削对方的善意。
现实案例：价格战——两家公司都希望对方维持高价（合作）而自己降价抢占市场（背叛），但如果双方都降价则两败俱伤（P）。结果通常是一方降价一方维持，形成非对称的（C,D）或（D,C）均衡。
又称斗鸡博弈、懦夫博弈、鹰鸽博弈。Robinson-Goforth 拓扑周期表 Layer 3。
Rapoport 四原型之一（Exploiter）。
"""
