name = "争夺博弈"

desc = """
「Battle」（Rapoport 称 Leader）— 序数偏好 T > S > R > P
两个非对称 NE：(C,D) 和 (D,C)。
从 (C,C) 单方偏离时双方都获益，但偏离者获益更多（T > S > R）。
命名由来：「Battle（争夺）」得名于双方争夺先手优势——偏离合作不仅有利可图，而且不会损害对方，适合先发制人。Rapoport 称其为 Leader（领先者）因为谁先行动谁就取得领先位置。
现实案例：技术创新竞赛——率先推出新产品的公司获得最大市场份额，追随者虽获利但较少，最终形成一方创新一方追随的（C,D）或（D,C）均衡。
Robinson-Goforth 拓扑周期表 Layer 3。Rapoport 四原型之一（Leader）。
"""
