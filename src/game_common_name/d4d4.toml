name = "妥协博弈"

desc = """
「Compromise」— 序数偏好 T > P > S > R
背叛严格占优。与死锁博弈类似但 S（合作遇背叛）优于 R（双方合作）。
这意味着被利用的结果还好过老老实实合作——处境更为极端。
命名由来：Compromise（妥协）一词同样是反讽——玩家妥协于最坏的结果（D,D），因为任何单方向的合作都会让自己损失更惨（R 垫底）。
现实案例：两个政客互相进行人身攻击——攻击对方（背叛）是占优策略：你攻击时取得优势（T），你被攻击时至少比被动不还手好（S > R）。最终双方都攻击（D,D 均衡），谁也没赢。
Robinson-Goforth 拓扑周期表 Layer 4。
"""
