name = "绝望博弈"

desc = """
序数偏好 P > T > S > R

背叛（D）严格占优，唯一纯策略 NE 为 (D,D)。R（双方合作）为最差收益。

**命名由来：** 「绝望」（Despair）描绘了一种结构性困境：不仅是背叛严格占优（如囚徒困境和标准死锁），而且合作行为本身（R）的收益竟然比被利用（S）还要糟糕。这里没有任何力量——无论是个人理性还是道德情感——能够把玩家推向合作。Robinson-Goforth (2005) 归类为 Deadlock 家族的极端变体（D1），与标准死锁（D5, T > P > R > S）相比更加悲观：在 D5 中玩家至少愿意在对方也合作时一起合作（R 排第二），在 D1 中连这一点都不成立。D1 和 D2 在文献中共同归入"死锁"大类，但 D1 是其中合作收益最低的子型。

**现实案例：** 两个战争中的囚犯被分开审讯。C = 保持沉默（忠于团体），D = 招供（背叛团体）。P（双方招供）：各判中等刑期——最佳（因为招供有宽大处理）。T（我招供、对方沉默）：我因招供获得最轻刑罚——次佳。S（我沉默、对方招供）：我因沉默被重判——糟糕。R（双方沉默）：团体利益最大化但个人风险最高——最差。即使双方都知道沉默对集体最好，个人理性迫使双方招供，（D,D）成为唯一均衡。

参考文献：Robinson & Goforth (2005); Bruns (2015).
"""
