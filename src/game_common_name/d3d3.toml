name = "委屈博弈"

desc = """
序数偏好 P > S > T > R

背叛（D）严格占优，唯一纯策略 NE 为 (D,D)。

**命名由来：** 「委屈」捕捉了本型独特的情感结构：S > T 意味着玩家宁愿当"委屈的被利用者"也不愿当"不光彩的利用者"——即使背叛是理性选择，情感上却更接受被伤害而不是伤害他人。在 Robinson-Goforth (2005) 的 12 种 RGT 基博弈中，D3 位于 Deadlock 家族与 Compromise 区域的边界。其最显著特征是在背叛占优的框架下出现了类似 C 类博弈的"利他"偏好（S > T），形成一种道德感与自利行为的冲突。与 D4（妥协博弈, T > P > S > R, 即标准 Compromise）形成互补：D4 是"先到先得"的竞争，而 D3 是"我吃亏可以但别让我当恶人"的无奈。

**现实案例：** 两位同事被要求加班完成项目。C = 主动接受加班，D = 拒绝加班。P（双方拒绝）：各回各家，项目延期但至少公平——最佳。S（我接受、对方拒绝）：我一个人扛了加班——虽然累但至少问心无愧（次佳）。T（我拒绝、对方接受）：我轻松了但对方在加班——良心不安（第三）。R（双方都接受）：一起加班——最差（既累又没必要）。最终双方都拒绝加班（D,D 均衡），但在情感上两害相权取其轻——宁可不加班也绝不当"那个不加班的人"。

参考文献：Robinson & Goforth (2005); Bruns (2015); Rapoport & Guyer (1966).
"""
