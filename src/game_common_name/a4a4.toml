name = "英雄博弈"

desc = """
序数偏好 S > T > P > R

无严格优势策略。两个纯策略 NE：(C,D) 和 (D,C)。R（双方合作）为最差收益。

**命名由来：** 「英雄」取意于玩家最偏好的结果是在对方背叛时仍然选择合作（S 最佳），如同"孤胆英雄"——独自承担风险却获得道德荣耀。本型为 Rapoport & Guyer (1966) 12 种严格对称序数博弈中的第 5 号（标准化后为 T > S > R > P），与斗鸡博弈（第 2 号标准化为 T > R > S > P）的区别在于 S > R——玩家更看重"独自挺身而出"而不是"双方都挺身而出"这一行为本身的象征价值。在 Robinson-Goforth (2005) 拓扑中位于 Chicken 与 Battle 之间的过渡区域，兼具反协调（anti-coordination）和英雄主义色彩。

**现实案例：** 记者报道一个丑闻。C = 发表报道，D = 沉默。S（我发表、对方沉默）：我是独家报道的勇敢记者——获得普利策奖级别的荣耀（最佳）。T（我沉默、对方发表）：对方爆了独家，我落后了——但仍能跟进报道（次佳）。P（双方都发表）：重复报道，影响力稀释——第三。R（双方都沉默）：真相被掩盖——最差（违背新闻理想）。结果一人报道一人沉默（C,D）或（D,C）均衡。

参考文献：Rapoport & Guyer (1966); Robinson & Goforth (2005); Bruns (2015).
"""
