desc = """
「Hero x Chicken」— Bruns (2015) 二名法
一方为 B3（英雄博弈，T>S>P>R，主动挑战者），另一方为 A6（铲雪博弈，T>R>S>P，斗鸡玩家）。
两个 Layer 1 型玩家的对决。两个非对称 NE：(C,D) 和 (D,C)。
双方都想让对方合作而自己背叛，但都不敢承担双方背叛的后果。冲突激烈。
命名由来：Hero（主动挑战者）对阵 Chicken（斗鸡博弈玩家）——两个背叛偏好型玩家的对决。
现实案例：两家科技巨头同时在研发类似产品——每家公司都希望对方放弃（合作）而自己独占市场（背叛），但双方都投入研发则浪费资源（P）。最后可能一家退出，也可能僵持。
另一案例：标准之争——两个联盟各自推广自己的技术标准，都希望对方放弃（合作）而自己标准胜出（背叛），形成标准大战。
Bruns (2015) 二名法体系中 Hero-Chicken 组合。
"""
