desc = """
「Harmony x Hero」— Bruns (2015) 二名法
一方为 C1（和谐博弈，R>S>T>P，偏好合作），另一方为 B3（英雄博弈，T>S>P>R，偏好英雄式对抗）。
和谐型玩家总是合作，英雄型玩家通过打破合作获取巨大收益。两者相遇时，英雄型玩家主导博弈进程。
命名由来：Bruns (2015) 二名法——Harmony 类型的玩家总是合作，Hero 类型的玩家通过打破合作（背叛）获取巨大收益。
现实案例：奉行长期合作的供应商（C1）面对激进的零售商（B3）——零售商要求降价否则更换供应商（背叛），供应商只能接受或寻找新客户。零售商在博弈中占据主动。
另一案例：激进改革者（B3）面对温和保守的社会（C1）——改革者打破旧规则，社会终究会适应新秩序。
Bruns (2015) 二名法体系中 Harmony-Hero 组合。
"""
