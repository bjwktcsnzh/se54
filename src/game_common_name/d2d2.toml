name = "自利博弈"

desc = """
序数偏好 P > T > R > S

背叛（D）严格占优，唯一纯策略 NE 为 (D,D)。R > S 意味着双方合作优于单方面被利用。

**命名由来：** 「自利」体现本型的核心逻辑——个人利益（背叛占优）压倒一切，但玩家并非完全短视：至少认可双方合作（R）优于被利用（S），这一点与 D1（S > R）形成对比。Robinson & Goforth (2005) 将 D2 定位为 Deadlock 家族中 D1 和标准死锁（D5, T > P > R > S）之间的过渡形态——比 D1 更"理性"（至少承认合作的相对价值），但比 D5 更"悲观"（合作的绝对排名更低）。在 Bruns (2015) 的二元命名法中，D2 是 Deadlock-Deadlock 坐标系的代表性变体。

**现实案例：** 两家便利店打价格战。C = 维持正常价格，D = 降价促销。P（双方都降价）：各自保有一定市场份额——最佳（因为降价可以吸引顾客）。T（我降价、对方不降）：我抢了对方的市场——次佳。R（双方都不降价）：维持利润但市场增长缓慢——尚可（至少没亏）。S（我不降、对方降价）：顾客流失——最差。尽管双方都知道都不降价（R）比被削价（S）好，但背叛的诱惑（T）和降价后的收益（P）使得降价（D）成为占优策略，形成（D,D）均衡。

参考文献：Robinson & Goforth (2005); Bruns (2015).
"""
