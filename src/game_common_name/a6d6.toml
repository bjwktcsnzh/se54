name = "智猪博弈"
rowPlayerName = "大猪"
colPlayerName = "小猪"
desc = """
「Boxed Pigs」（Rasmusen 经典模型）
大猪按按钮（合作），小猪搭便车（背叛）。
大猪没有严格占优策略，小猪有严格占优策略——等待。
唯一 NE：大猪按、小猪等。
命名由来：该模型由 Eric Rasmusen 在《Games and Information》（1989）中提出，原名为「Boxed Pigs」——一头大猪和一头小猪被关在一个箱子里，箱外有杠杆，按杠杆会释放食物但消耗体力。大猪会去按杠杆，因为不按的话谁也吃不到（大猪等不起），小猪则总是等待（搭便车），因为按了也抢不过大猪。中文名「智猪博弈」取自小猪搭便车这一看似精明的行为。
现实案例：大公司与小公司在研发投入上的博弈——大公司投入研发（合作），小公司等大公司研发成功后模仿（搭便车）。小公司看似聪明地节省了成本，但长期看整个行业的创新动力会因此减弱。
"""
